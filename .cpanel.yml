---
# cPanel "Git Version Control" config for bravoavtodproc.am.
#
# Docs: https://docs.cpanel.net/cpanel/files/git-version-control/
#
# IMPORTANT — there are intentionally NO deployment tasks.
#
# This repository's Repository Path IS the document root
# (/home/davidbro/public_html). Because the git working tree and the doc
# root are the same directory, clicking "Update from Remote" in cPanel
# pulls the latest commit straight into the live site — that single action
# IS the deploy. No copy step is needed.
#
# A previous version of this file ran `cp -a` plus
# `rm -rf "$DEPLOYPATH/.git"` with DEPLOYPATH=public_html. Since the repo
# lives in public_html, that task would have deleted the repo's own .git
# directory and copied the tree onto itself. It is removed deliberately —
# do not re-add deployment tasks unless the repo is moved OUT of the doc
# root.
#
# Publish flow: `pnpm run deploy` (build + push to broavtodproc_out) then
# cPanel → Git Version Control → "Update from Remote". Done.

deployment:
  tasks: []
